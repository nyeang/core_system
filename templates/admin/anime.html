{{ define "anime_content" }}
<div class="bg-white rounded-lg shadow-sm border border-gray-200">

    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
        <div>
            <h3 class="text-base font-semibold text-gray-800">Anime Library</h3>
            <p class="text-xs text-gray-400 mt-0.5">{{ len .anime }} anime in database</p>
        </div>
    </div>

    <!-- Grid -->
    <div class="p-6 grid gap-5" style="grid-template-columns: repeat(5, minmax(0, 1fr));">
        {{ range .anime }}
        <div class="group flex flex-col border border-gray-200 rounded-lg overflow-hidden hover:shadow-md transition-shadow duration-200 bg-white">
            <!-- Poster -->
            <div class="relative overflow-hidden bg-gray-100" style="aspect-ratio: 3/4;">
                <img
                    src="{{ .LargeImageURL }}"
                    alt="{{ .Title }}"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                    onerror="this.src='{{ .ImageURL }}'">
            </div>

            <!-- Info -->
            <div class="flex flex-col flex-1 p-3">
                <p class="text-xs font-semibold text-gray-800 leading-tight mb-1 line-clamp-2" title="{{ .Title }}">
                    {{ .Title }}
                </p>
                <p class="text-xs text-gray-400 truncate">{{ .Genres }}</p>
            </div>
        </div>
        {{ else }}
        <div class="col-span-5 py-16 text-center text-gray-400">
            <i class="fas fa-film text-3xl mb-3"></i>
            <p class="text-sm">No anime in database</p>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
